<!-- Forms Inputs -->
 <input type="text" placeholder="Enter your name"><br><br>
 <input type="email" placeholder="Enter your email"><br><br>
 <input type="password" placeholder="Password"><br><br>
 <input type="number" min="1" max="100"><br><br>
 <input type="file"><br><br>
 <input type="date"><br><br>

<!-- Radio Button -->
 <label><input type="radio" name="gender" value="male">Male</label><br>
 <label><input type="radio" name="gender" value="female">Female</label><br><br>

 
<!-- Checkboxes -->
 <label><input type="checkbox" value="html">HTML</label>
 <label><input type="checkbox" value="css">CSS</label>
 <label><input type="checkbox" value="js">JavaScript</label><br><br>

<!-- Dropdown - select Tag -->
 <select>
    <option>Select your country</option>
    <option>India</option>
    <option>USA </option>
    <option>UK</option>
 </select><br><br>

<!-- Textarea  -->
 <textarea rows="4" cols="30" placeholder="Type your msg"></textarea><br><br>

 <!-- Submit button -->
<button style="background: blue;">Submit</button>
