<!DOCTYPE html>
<html>
<head>
    <title>Job Application Form</title>
</head>
<body>

    <h1 style="text-align:center;">Job Application Form</h1>
    <hr>

    <form style="width:350px; margin:auto;">

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter your name" required><br><br>

        <label>Email Address:</label><br>
        <input type="email" placeholder="Enter your email" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" placeholder="Enter phone number" required><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male <br>
        <input type="radio" name="gender" value="female"> Female <br><br>

        <label>Position Applied For:</label><br>
        <select required>
            <option>Select Position</option>
            <option>Software Developer</option>
            <option>Web Designer</option>
            <option>Data Analyst</option>
            <option>Manager</option>
        </select><br><br>

        <label>Experience (Years):</label><br>
        <input type="number" min="0" max="40"><br><br>

        <label>Upload Resume:</label><br>
        <input type="file" required><br><br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30" placeholder="Enter your address"></textarea><br><br>

        <button type="submit" style="padding:10px 20px;">Submit</button>
        <button type="reset" style="padding:10px 20px;">Reset</button>

    </form>

    <hr>
    <p style="text-align:center;">© 2025 Company Careers</p>

</body>
</html>
