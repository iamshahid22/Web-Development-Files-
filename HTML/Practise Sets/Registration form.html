<!DOCTYPE html>
<html>
    <head>
        <title>Student Registration Form</title>
    </head>

    <body>
        <h4 style="text-align: center;">STUDENT REGISTRATION FORM</h4>
        <hr>
        <form>
            <h3>Personal Details</h3>
            <label>Full Name:</label><br>
            <input type="text" name="fullname" placeholder="Enter your Full name here"><br><br>

            <label>Father's Name:</label><br>
            <input type="text" name="Father'sname" placeholder="Enter your Father's name here"><br><br>
            
            <label>Date of Birth:</label><br>
            <input type="date"><br><br>

            <label>Gender:</label><br>
            <input type="radio" name="gender" placeholder="male">Male<br><br>
            <input type="radio" name="gender" placeholder="female">FeMale<br><br>

            <label>Email:</label><br>
            <input type="email" name="email" placeholder="Enter your email"><br><br>

            <label>Phone Number:</label><br>
            <input type="number" placeholder="Enter your Phone Number"><br><br>

            <label>Address:</label><br>
            <input type="address" rows="4" cols="40"  placeholder="Enter your Address"><br><br>

            <label>City:</label><br>
            <input type="text" name="city" placeholder="Enter your city"><br><br>

            <label>Pincode:</label>
            <input type="number" name="pincode" placeholder="Enter your pincode"><br><br>

            <label>Course:</label><br>
            <select name="course">
            <option>B.Tech</option>
            <option>B.Sc</option>
            <option>B.Com</option>
            <option>BA</option>
            <option>Diploma</option>
            </select><br><br>

            <label>Department:</label><br>
            <select name="department">
            <option>CSE</option>
            <option>ECE</option>
            <option>EEE</option>
            <option>Mechanical</option>
            <option>Civil</option>
            </select><br><br>

            <label>Year of Study:</label><br>
            <select name="year">
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
            </select><br><br>
           
            <button type="submit">Submit</button>
        </form>
    </body>
</html>
