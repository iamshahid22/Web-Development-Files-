<!DOCTYPE html>
<html>
    <head>
        <title>Contact form</title>
    </head>
    <body>
      <h1 style="text-align: center;">CONTACT US</h1> <hr>
      <form style="width: 300px; margin: auto;">
        <label>Your Name:</label>
        <input type="text" placeholder="Enter your name"><br><br>

        <label>EmailAddress:</label>
        <input type="email" placeholder="Enter your email"><br><br>

        <label>Phone Number:</label>
        <input type="number" placeholder="Enter phone number"><br><br>

        <label>Subject:</label>
        <input type="text" placeholder="subject"><br><br>

        <label>Message:</label>
            <textarea rows="5" cols="30" placeholder="write your message here.."></textarea><br><br>
        
        <button type="submit" style="padding: 10px 20px;">Send</button>
      </form> 
    </body>
</html>
